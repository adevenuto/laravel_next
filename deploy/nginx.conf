# /etc/nginx/sites-available/laravel_next
#
# One vhost serves both apps on port 80:
#   /api/*, /sanctum/*  → Laravel via PHP-FPM (backend/public/index.php)
#   everything else     → Next.js standalone via pm2 on 127.0.0.1:3000
#
# Bootstrap script symlinks this file into sites-enabled.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/laravel_next/backend/public;
    index index.php;

    client_max_body_size 20M;

    # Long-cache Next.js fingerprinted assets directly from disk
    location /_next/static/ {
        alias /var/www/laravel_next/client/.next/standalone/.next/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Laravel routes — anything starting with /api or /sanctum
    location ~ ^/(api|sanctum)(/|$) {
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM handler (Laravel's front controller)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Everything else → Next.js standalone
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # Deny dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
