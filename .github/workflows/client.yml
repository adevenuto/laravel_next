name: Client CI + Deploy

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: client

jobs:
  build:
    name: Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build (standalone)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Stage standalone output
        # Next.js standalone doesn't auto-copy `public/` or `.next/static/`.
        # Bundle them in alongside server.js so the EC2 receives a self-contained payload.
        run: |
          mkdir -p deploy_out
          cp -R .next/standalone/. deploy_out/
          mkdir -p deploy_out/.next
          cp -R .next/static deploy_out/.next/static
          cp -R public deploy_out/public

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: client-standalone
          path: client/deploy_out/
          retention-days: 1

  deploy:
    name: Deploy to EC2
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-client
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: client-standalone
          path: client/deploy_out/

      - name: Sync standalone output to EC2
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr --delete
            --exclude='.env*'
            --exclude='.git/'
          path: client/deploy_out/
          remote_path: /var/www/laravel_next/client/.next/standalone/
          remote_host: ${{ secrets.EC2_HOST }}
          remote_user: ${{ secrets.EC2_USER }}
          remote_key: ${{ secrets.EC2_SSH_KEY }}

      - name: Reload pm2 on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/laravel_next/client/.next/standalone
            sudo chown -R www-data:www-data /var/www/laravel_next/client
            # First-time deploys won't have the process yet; start if absent, reload if present.
            sudo -u www-data pm2 reload laravel_next_client --update-env 2>/dev/null \
              || sudo -u www-data pm2 start server.js --name laravel_next_client --cwd /var/www/laravel_next/client/.next/standalone
            sudo -u www-data pm2 save
